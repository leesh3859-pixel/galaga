<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>갤러그</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game">
    <h1>GALAGA</h1>
    <div class="layout">
      <canvas id="board" width="480" height="640"></canvas>
      <aside class="sidebar">
        <div class="panel stats">
          <p>SCORE</p>
          <span id="score">0</span>
          <p>HIGH</p>
          <span id="high">0</span>
          <p>STAGE</p>
          <span id="stage">1</span>
          <p>LIVES</p>
          <span id="lives">3</span>
        </div>
        <button id="start">시작 / 재시작</button>
        <div class="help">
          <p>← → : 이동</p>
          <p>Space : 발사</p>
          <p>P : 일시정지</p>
        </div>
      </aside>
    </div>
    <div id="overlay" class="overlay hidden">
      <p id="overlay-text">PRESS START</p>
    </div>
  </div>
  <script src="galaga.js"></script>
</body>
</html>
